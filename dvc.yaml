stages:
  split:
    cmd: python src/data/data_splitting.py
    deps:
    - data/raw/raw.csv
    - src/data/data_splitting.py
    outs:
    - data/processed/X_test.csv
    - data/processed/X_train.csv
    - data/processed/y_test.csv
    - data/processed/y_train.csv
  normalize:
    cmd: python src/data/data_normalization.py
    deps:
    - data/processed/X_test.csv
    - data/processed/X_train.csv
    - src/data/data_normalization.py
    outs:
    - data/processed/X_test_scaled.csv
    - data/processed/X_train_scaled.csv
  gridsearch:
    cmd: python src/models/gridsearch.py
    deps:
    - data/processed/X_train_scaled.csv
    - data/processed/y_train.csv
    - src/models/gridsearch.py
    outs:
    - models/best_params.pkl
  training:
    cmd: python src/models/train.py
    deps:
    - data/processed/X_train_scaled.csv
    - data/processed/y_train.csv
    - models/best_params.pkl
    - src/models/train.py
    outs:
    - models/trained_model.pkl
  evaluation:
    cmd: python src/models/evaluation.py
    deps:
    - data/processed/X_test_scaled.csv
    - data/processed/y_test.csv
    - models/trained_model.pkl
    - src/models/evaluation.py
    outs:
    - data/predictions/prediction.csv
    metrics:
    - metrics/scores.json:
        cache: false
